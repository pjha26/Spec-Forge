version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: specforge
      POSTGRES_USER: specforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://specforge:${POSTGRES_PASSWORD:-changeme}@db:5432/specforge
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      ISSUER_URL: ${ISSUER_URL:-https://replit.com/oidc}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      # Local dev auth bypass (leave unset / false in production)
      LOCAL_DEV: ${LOCAL_DEV:-false}
      LOCAL_DEV_USER_ID: ${LOCAL_DEV_USER_ID:-local-dev-user}

volumes:
  pgdata:
