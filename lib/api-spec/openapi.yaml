openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SpecForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: specs
    description: Generated spec documents
  - name: anthropic
    description: Anthropic AI chat operations
  - name: auth
    description: Authentication operations
  - name: notifications
    description: In-app notification operations
paths:
  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user or unauthenticated state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /login:
    get:
      operationId: login
      tags: [auth]
      summary: Redirect to OIDC login
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to OIDC provider

  /logout:
    get:
      operationId: logout
      tags: [auth]
      summary: Log out and clear session
      responses:
        "302":
          description: Redirect after logout

  /callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: OIDC callback
      responses:
        "302":
          description: Redirect after authentication

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Exchange authorization code for mobile session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Log out mobile session
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /specs:
    get:
      operationId: listSpecs
      tags: [specs]
      summary: List all generated specs
      responses:
        "200":
          description: List of specs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Spec"
    post:
      operationId: createSpec
      tags: [specs]
      summary: Generate a new spec document using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecBody"
      responses:
        "201":
          description: Created spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"

  /specs/{id}:
    get:
      operationId: getSpec
      tags: [specs]
      summary: Get a specific spec document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spec document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSpec
      tags: [specs]
      summary: Delete a spec document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/stream:
    post:
      operationId: streamSpec
      tags: [specs]
      summary: Stream a spec document generation via SSE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of generated spec content
          content:
            text/event-stream: {}

  /specs/{id}/chat:
    post:
      operationId: getOrCreateSpecChat
      tags: [specs]
      summary: Get or create a conversation for asking questions about a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation for this spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/share/{token}:
    get:
      operationId: getSpecByShareToken
      tags: [specs]
      summary: Get a publicly shared spec by its share token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared spec document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/sync:
    post:
      operationId: syncSpec
      tags: [specs]
      summary: Manually trigger a re-generation of a spec from its original source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncSpecResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/webhook:
    get:
      operationId: getSpecWebhook
      tags: [specs]
      summary: Get or create webhook configuration for a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Webhook config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfigResponse"
        "404":
          description: Not found

  /webhooks/github:
    post:
      operationId: githubWebhook
      tags: [specs]
      summary: Receive GitHub push webhooks
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                required:
                  - processed

  /specs/{id}/versions:
    get:
      operationId: listSpecVersions
      tags: [specs]
      summary: List saved versions of a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of spec versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SpecVersionMeta"
                required:
                  - versions
        "404":
          description: Spec not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/versions/{versionId}:
    get:
      operationId: getSpecVersion
      tags: [specs]
      summary: Get full content of a specific version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full version content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecVersion"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/presence:
    get:
      operationId: getSpecPresence
      tags: [specs]
      summary: Subscribe to real-time viewer presence for a spec (SSE)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of viewer presence updates
          content:
            text/event-stream: {}

  /specs/{id}/insights:
    post:
      operationId: analyzeSpec
      tags: [specs]
      summary: Get AI-powered health insights and analysis for a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spec health insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecInsightsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      responses:
        "200":
          description: Notification list with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/stream:
    get:
      operationId: streamNotifications
      tags: [notifications]
      summary: Subscribe to real-time notification updates (SSE)
      responses:
        "200":
          description: SSE stream of new notifications
          content:
            text/event-stream: {}

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /specs/{id}/share:
    post:
      operationId: shareSpec
      tags: [specs]
      summary: Generate or retrieve a public share link for a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareSpecResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/recent:
    get:
      operationId: listRecentSpecs
      tags: [specs]
      summary: List recent specs with stats
      responses:
        "200":
          description: Recent specs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentSpecsResponse"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    TechDebtRisk:
      type: object
      properties:
        title:
          type: string
        severity:
          type: string
          enum: [high, medium, low]
        description:
          type: string
      required:
        - title
        - severity
        - description

    Spec:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        specType:
          type: string
          enum: [system_design, api_design, database_schema, feature_spec]
        inputType:
          type: string
          enum: [github_url, description]
        inputValue:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, generating, completed, failed]
        complexityScore:
          type: integer
          nullable: true
        techDebtRisks:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TechDebtRisk"
        complexitySummary:
          type: string
          nullable: true
        mermaidDiagram:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        shareToken:
          type: string
          nullable: true
        viewCount:
          type: integer
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - specType
        - inputType
        - inputValue
        - content
        - status
        - viewCount
        - createdAt
        - updatedAt

    ShareSpecResponse:
      type: object
      properties:
        shareToken:
          type: string
        shareUrl:
          type: string
        viewCount:
          type: integer
      required:
        - shareToken
        - shareUrl
        - viewCount

    CreateSpecBody:
      type: object
      properties:
        specType:
          type: string
          enum: [system_design, api_design, database_schema, feature_spec]
        inputType:
          type: string
          enum: [github_url, description]
        inputValue:
          type: string
        title:
          type: string
        aiModel:
          type: string
          enum: [claude-sonnet-4-6, gpt-5.4, gpt-5.1, gemini-2.5-pro, gemini-2.5-flash]
      required:
        - specType
        - inputType
        - inputValue
        - title

    RecentSpecsResponse:
      type: object
      properties:
        specs:
          type: array
          items:
            $ref: "#/components/schemas/Spec"
        totalCount:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
      required:
        - specs
        - totalCount
        - byType

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required:
        - id

    GetCurrentAuthUserResponse:
      type: object
      properties:
        isAuthenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
          nullable: true
      required:
        - isAuthenticated

    ExchangeMobileAuthorizationCodeBody:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        state:
          type: string
        nonce:
          type: string
        redirect_uri:
          type: string
      required:
        - code
        - code_verifier
        - state
        - redirect_uri

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    LogoutMobileSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    SyncSpecResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        lastSyncedAt:
          type: string
          nullable: true
      required:
        - id
        - status

    WebhookConfigResponse:
      type: object
      properties:
        webhookUrl:
          type: string
        secret:
          type: string
        instructions:
          type: string
      required:
        - webhookUrl
        - secret
        - instructions

    SpecVersionMeta:
      type: object
      properties:
        id:
          type: integer
        specId:
          type: integer
        complexityScore:
          type: integer
          nullable: true
        triggeredBy:
          type: string
          enum: [initial, manual, github_webhook]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - specId
        - triggeredBy
        - createdAt

    SpecVersion:
      type: object
      properties:
        id:
          type: integer
        specId:
          type: integer
        content:
          type: string
        complexityScore:
          type: integer
          nullable: true
        techDebtRisks:
          type: string
          nullable: true
        complexitySummary:
          type: string
          nullable: true
        mermaidDiagram:
          type: string
          nullable: true
        triggeredBy:
          type: string
          enum: [initial, manual, github_webhook]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - specId
        - content
        - triggeredBy
        - createdAt

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    SpecPresenceViewer:
      type: object
      properties:
        sessionId:
          type: string
        name:
          type: string
        color:
          type: string
        joinedAt:
          type: string
      required:
        - sessionId
        - name
        - color
        - joinedAt

    SpecInsightsResponse:
      type: object
      properties:
        completeness:
          type: integer
        overallHealth:
          type: string
          enum: [excellent, good, fair, poor]
        missingAreas:
          type: array
          items:
            type: string
        strengthAreas:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        estimatedImplementationDays:
          type: integer
      required:
        - completeness
        - overallHealth
        - missingAreas
        - strengthAreas
        - suggestions
        - estimatedImplementationDays

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
          enum: [sync_complete, sync_failed, share_viewed]
        title:
          type: string
        message:
          type: string
        specId:
          type: integer
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - type
        - title
        - message
        - read
        - createdAt

    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
      required:
        - notifications
        - unreadCount
