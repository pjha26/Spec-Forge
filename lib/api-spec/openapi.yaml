openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SpecForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: specs
    description: Generated spec documents
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /specs:
    get:
      operationId: listSpecs
      tags: [specs]
      summary: List all generated specs
      responses:
        "200":
          description: List of specs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Spec"
    post:
      operationId: createSpec
      tags: [specs]
      summary: Generate a new spec document using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecBody"
      responses:
        "201":
          description: Created spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"

  /specs/{id}:
    get:
      operationId: getSpec
      tags: [specs]
      summary: Get a specific spec document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spec document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSpec
      tags: [specs]
      summary: Delete a spec document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/{id}/stream:
    post:
      operationId: streamSpec
      tags: [specs]
      summary: Stream a spec document generation via SSE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of generated spec content
          content:
            text/event-stream: {}

  /specs/{id}/chat:
    post:
      operationId: getOrCreateSpecChat
      tags: [specs]
      summary: Get or create a conversation for asking questions about a spec
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation for this spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /specs/recent:
    get:
      operationId: listRecentSpecs
      tags: [specs]
      summary: List recent specs with stats
      responses:
        "200":
          description: Recent specs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentSpecsResponse"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    TechDebtRisk:
      type: object
      properties:
        title:
          type: string
        severity:
          type: string
          enum: [high, medium, low]
        description:
          type: string
      required:
        - title
        - severity
        - description

    Spec:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        specType:
          type: string
          enum: [system_design, api_design, database_schema, feature_spec]
        inputType:
          type: string
          enum: [github_url, description]
        inputValue:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, generating, completed, failed]
        complexityScore:
          type: integer
          nullable: true
        techDebtRisks:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TechDebtRisk"
        complexitySummary:
          type: string
          nullable: true
        mermaidDiagram:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - specType
        - inputType
        - inputValue
        - content
        - status
        - createdAt
        - updatedAt

    CreateSpecBody:
      type: object
      properties:
        specType:
          type: string
          enum: [system_design, api_design, database_schema, feature_spec]
        inputType:
          type: string
          enum: [github_url, description]
        inputValue:
          type: string
        title:
          type: string
      required:
        - specType
        - inputType
        - inputValue
        - title

    RecentSpecsResponse:
      type: object
      properties:
        specs:
          type: array
          items:
            $ref: "#/components/schemas/Spec"
        totalCount:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
      required:
        - specs
        - totalCount
        - byType

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
